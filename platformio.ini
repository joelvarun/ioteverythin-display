; PlatformIO Project Configuration
; Waveshare ESP32-S3-Touch-LCD-4 (SKU 28154)
; 480x480 RGB LCD (ST7701) + GT911 Touch + ESP32-S3-N16R8
; UI: LVGL 8.3

[env:esp32s3_touch_lcd_4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ── Memory: 16 MB Flash, 8 MB OPI PSRAM ──
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; ── Build flags ──
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    -I .pio/libdeps/esp32s3_touch_lcd_4/ArduinoJson

; ── Exclude unused sources ──
build_src_filter = +<*> -<weather.cpp>

; ── Serial ──
monitor_speed = 115200

; ── Libraries ──
lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.2
    lvgl/lvgl@~8.3.0
    bblanchon/ArduinoJson@^7

; ── Upload ──
upload_speed = 921600
